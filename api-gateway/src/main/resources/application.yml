spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:

            - id: auth-public
              uri: http://mysql:8081
              predicates:
                - Path=/auth/login,/auth/register

            - id: book-service
              uri: http://mysql:8082
              predicates:
                - Path=/books/**
              filters:
                - jwtFilter

            - id: cart-service
              uri: http://mysql:8083
              predicates:
                - Path=/cart/**
              filters:
                - jwtFilter

            - id: order-service
              uri: http://mysql:8085
              predicates:
                - Path=/orders/**
              filters:
                - jwtFilter

            - id: inventory-service
              uri: http://mysql:8086
              predicates:
                - Path=/inventory/**
              filters:
                - jwtFilter

            - id: review-service
              uri: http://mysql:8087
              predicates:
                - Path=/reviews/**
              filters:
                - jwtFilter

            - id: payment-service
              uri: http://mysql:8088
              predicates:
                - Path=/payments/**
              filters:
                - jwtFilter

            - id: user-service
              uri: http://mysql:8089
              predicates:
                - Path=/users/**
              filters:
                - jwtFilter

            - id: notification-service
              uri: http://mysql:8090
              predicates:
                - Path=/notifications/**
              filters:
                - jwtFilter

            - id: recommendation-service
              uri: http://mysql:8091
              predicates:
                - Path=/recommendations/**
              filters:
                - jwtFilter

  server:
    port: 8080

  app:
    jwt:
      secret: bXlzZWNyZXRrZXlteXNlY3JldGtleW15c2VjcmV0a2V5MTIzNDU2